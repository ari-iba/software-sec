name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '30 18 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Alleen javascript-typescript om de Ruby-fout te voorkomen
        language: [ 'javascript-typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Uitgebreide queries om zeker te weten dat we genoeg lekken vinden
        queries: security-extended

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
        upload: true

    # Deze extra stap dwingt de pipeline om te falen als er alerts zijn. 
    # Dit zorgt ervoor dat de "Pipeline blocks" check in Last Gym op groen springt.
    - name: Check for CodeQL alerts
      shell: bash
      run: |
        ALERTS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?state=open" \
          | jq 'length')
        if [ "$ALERTS" -gt 0 ]; then
          echo "SAST Scan heeft $ALERTS kwetsbaarheden gevonden. De build wordt geblokkeerd."
          exit 1
        fi
