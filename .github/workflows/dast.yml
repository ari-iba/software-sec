name: "DAST Scan (OWASP ZAP)"

on:
  workflow_dispatch: {}
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 4 * * 1'

jobs:
  dast:
    name: DAST Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: DAST: Log start
        run: |
          echo "===== DAST job starting ====="
          date
          env | sort

      - name: Start Juice Shop (Docker)
        run: |
          set -x
          echo "Pulling juice-shop image"
          docker pull bkimminich/juice-shop:latest
          docker network create zapnet || true
          docker run -d --name juice --network zapnet -p 3000:3000 bkimminich/juice-shop:latest
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 > /dev/null; then
              echo "Juice-Shop is up"
              break
            fi
            sleep 2
          done

      - name: Run OWASP ZAP baseline scan
        run: |
          set -x
          echo "Pulling ZAP docker image"
          docker pull owasp/zap2docker-stable
          mkdir -p report
          echo "Running zap-baseline against http://juice:3000"
          docker run --rm --network zapnet -v $(pwd)/report:/zap/wrk owasp/zap2docker-stable zap-baseline.py -t http://juice:3000 -r /zap/wrk/dast-report.html -I || true
          if [ -f report/dast-report.html ]; then
            echo "Report saved to report/dast-report.html"
          else
            echo "Report not found - continuing"
          fi

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: report/dast-report.html

      - name: Fail on medium/high alerts
        if: always()
        run: |
          if [ -f report/dast-report.html ]; then
            if grep -E "Medium|High" report/dast-report.html >/dev/null; then
              echo "Medium/High alerts found"
              exit 1
            else
              echo "No Medium/High alerts"
            fi
          else
            echo "No report to check"
          fi

      - name: Stop Juice Shop
        if: always()
        run: |
          docker rm -f juice || true
