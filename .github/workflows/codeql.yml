name: "SCA Scan (Dependency Check)"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  sca:
    name: SCA Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Dependency scanning using npm audit (Node.js projects)
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run npm audit
        run: npm audit --json > audit.json || true

      # ✅ Fail pipeline if vulnerabilities exist
      - name: Check vulnerabilities
        run: |
          VULNS=$(cat audit.json | jq '.metadata.vulnerabilities.total')

          echo "Total vulnerabilities: $VULNS"

          if [ "$VULNS" -gt 0 ]; then
            echo "❌ Vulnerabilities found! Blocking pipeline."
            exit 1
          else
            echo "✅ No vulnerabilities found"
          fi
