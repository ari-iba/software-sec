name: "SCA Scan (Dependency Check)"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  sca:
    name: SCA Scan
    needs: secret-scan
    continue-on-error: true
    runs-on: ubuntu-latest
    outputs:
      vulns_found: ${{ steps.sca_results.outputs.vulns_found }}

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Dependency scanning using npm audit (Node.js projects)
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run npm audit
        run: npm audit --json > audit.json || true

      # ✅ Fail pipeline if vulnerabilities exist
      - name: Check vulnerabilities
        run: |
          VULNS=$(cat audit.json | jq '.metadata.vulnerabilities.total')

          echo "Total vulnerabilities: $VULNS"

          if [ "$VULNS" -gt 0 ]; then
            echo "❌ Vulnerabilities found! Blocking pipeline."
            # mark vulnerabilities found for downstream enforcement
            echo "vulns_found=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No vulnerabilities found"
            echo "vulns_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Set sca output
        id: sca_results
        if: always()
        run: |
          # If $GITHUB_OUTPUT already has vulns_found it will be available here via step outputs
          if [ -f audit.json ]; then
            V=$(cat audit.json | jq '.metadata.vulnerabilities.total')
            if [ "$V" -gt 0 ]; then
              echo "vulns_found=true" >> $GITHUB_OUTPUT
            else
              echo "vulns_found=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "vulns_found=false" >> $GITHUB_OUTPUT
          fi

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      secrets_found: ${{ steps.secret_results.outputs.secrets_found }}
    permissions:
      contents: read
      pull-requests: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks CLI
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sL https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_Linux_x86_64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gitleaks detect --source . --report-format json --report-path gitleaks-report.json || true

      - name: Set secret-scan output
        id: secret_results
        run: |
          if [ -f gitleaks-report.json ] && [ -s gitleaks-report.json ]; then
            echo "secrets_found=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail on findings
        if: always()
        run: |
          if [ -f gitleaks-report.json ] && [ -s gitleaks-report.json ]; then
            echo "Secrets found by gitleaks — failing pipeline"
            cat gitleaks-report.json
          else
            echo "No secrets found"
          fi

  dast:
    name: DAST Scan
    needs: secret-scan
    continue-on-error: true
    runs-on: ubuntu-latest
    outputs:
      dast_alerts: ${{ steps.dast_results.outputs.dast_alerts }}

    steps:
      - name: Start Juice Shop (Docker)
        run: |
          docker pull bkimminich/juice-shop:latest
          docker run -d --name juice -p 3000:3000 bkimminich/juice-shop:latest
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 > /dev/null; then
              echo "Juice-Shop is up"
              break
            fi
            sleep 2
          done

      - name: Run OWASP ZAP baseline scan
        run: |
          docker pull owasp/zap2docker-stable
          docker run --rm --network host owasp/zap2docker-stable zap-baseline.py -t http://localhost:3000 -r dast-report.html -I

      - name: Save report
        run: |
          mkdir -p report
          docker run --rm --network host -v $(pwd)/report:/zap/wrk owasp/zap2docker-stable cp /zap/wrk/dast-report.html /zap/wrk/dast-report.html || true
          if [ -f report/dast-report.html ]; then
            echo "Report saved to report/dast-report.html"
          else
            echo "Report not found - continuing"
          fi

      - name: Fail on medium/high alerts
        id: dast_results
        if: always()
        run: |
          if [ -f report/dast-report.html ]; then
            if grep -E "Medium|High" report/dast-report.html >/dev/null; then
              echo "dast_alerts=true" >> $GITHUB_OUTPUT
              echo "Medium/High alerts found"
            else
              echo "dast_alerts=false" >> $GITHUB_OUTPUT
              echo "No Medium/High alerts"
            fi
          else
            echo "dast_alerts=false" >> $GITHUB_OUTPUT
            echo "No report to check"
          fi

      - name: Upload DAST report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: report/dast-report.html

      - name: Stop Juice Shop
        if: always()
        run: |
          docker rm -f juice || true

  enforce-blockers:
    name: Enforce Findings
    runs-on: ubuntu-latest
    needs: [ secret-scan, sca, dast ]
    steps:
      - name: Summary and fail when necessary
        run: |
          SECRETS_FOUND="${{ needs.secret-scan.outputs.secrets_found }}"
          VULNS_FOUND="${{ needs.sca.outputs.vulns_found }}"
          DAST_ALERTS="${{ needs.dast.outputs.dast_alerts }}"

          echo "Secrets found: $SECRETS_FOUND"
          echo "Vulnerabilities found: $VULNS_FOUND"
          echo "DAST medium/high alerts: $DAST_ALERTS"

          if [ "$SECRETS_FOUND" = "true" ]; then
            echo "Failing due to secrets found by gitleaks"
            exit 1
          fi

          if [ "$VULNS_FOUND" = "true" ]; then
            echo "Failing due to SCA vulnerabilities"
            exit 1
          fi

          if [ "$DAST_ALERTS" = "true" ]; then
            echo "Failing due to DAST medium/high alerts"
            exit 1
          fi

          echo "No blocking findings"
